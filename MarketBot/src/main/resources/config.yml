# MarketBot config.yml

# ID del canale Discord (non più necessario con webhook, lascia pure)
discord-channel-id: ""

# URL del webhook Discord del canale #mercato
webhook-url: ""

# Intervallo in ore tra ogni aggiornamento del mercato
update-interval-hours: 2

# Intervallo in minuti per il controllo boom/crash
crash-check-minutes: 10

# Soglia % per alert boom/crash (es. 30 = ±30%)
crash-boom-threshold: 30

# ID del ruolo da menzionare ad ogni aggiornamento (0 = disabilitato)
mention-role-id: "0"

# Item da monitorare — formato: NomeSezione.MATERIALE
items:
  - Ores.COAL
  - Ores.REDSTONE
  - Ores.GOLD_INGOT
  - Ores.IRON_INGOT
  - Ores.COPPER_INGOT
